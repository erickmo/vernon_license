name: flash_developer
description: FlashERP Developer — Approval app untuk developer_sales.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.4.3+1

  # Local Storage
  flutter_secure_storage: ^10.0.0

  # Dependency Injection
  get_it: ^9.2.1

  # Functional Programming
  dartz: ^0.10.1

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
