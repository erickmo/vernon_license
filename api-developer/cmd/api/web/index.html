<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#4D2975">
  <meta name="description" content="Vernon License — Developer Portal">
  <title>Masuk — Vernon License</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p700: #4D2975; --p600: #5E3490; --p500: #7048A8;
      --p100: #E8DDFF; --p50: #F4F0FF;
      --gold: #E9A800; --teal: #26B8B0;
      --err: #EF4444; --ok: #22C55E;
      --bg: #F8F7FF; --surface: #fff;
      --txt: #111827; --muted: #6B7280;
      --border: #E5E7EB;
      --radius: 12px;
      --shadow: 0 20px 60px rgba(77,41,117,.18), 0 4px 16px rgba(0,0,0,.08);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #2D1654 0%, #4D2975 45%, #5E3490 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* Decorative blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(233,168,0,.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(38,184,176,.10) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: var(--p700);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-icon svg { width: 28px; height: 28px; }
    .logo-text h1 {
      font-size: 18px; font-weight: 800;
      color: var(--txt); letter-spacing: -.3px;
    }
    .logo-text p {
      font-size: 12px; color: var(--muted); margin-top: 1px;
    }

    /* Welcome */
    .welcome h2 { font-size: 22px; font-weight: 700; color: var(--txt); }
    .welcome p { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* Form */
    form { margin-top: 28px; }
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--txt); margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 12px;
      color: var(--muted); pointer-events: none;
      display: flex;
    }
    .input-icon svg { width: 16px; height: 16px; }
    input[type=email], input[type=password] {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px; color: var(--txt);
      background: var(--bg);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--p600);
      box-shadow: 0 0 0 3px rgba(94,52,144,.12);
      background: #fff;
    }
    input.err { border-color: var(--err); }

    .toggle-pwd {
      position: absolute; right: 12px;
      background: none; border: none;
      cursor: pointer; color: var(--muted);
      display: flex; padding: 4px;
      transition: color .15s;
    }
    .toggle-pwd:hover { color: var(--p600); }
    .toggle-pwd svg { width: 16px; height: 16px; }

    /* Error */
    .alert {
      display: none;
      background: #FEF2F2; border: 1px solid #FECACA;
      color: #DC2626; border-radius: 8px;
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px;
      align-items: center; gap: 8px;
    }
    .alert.show { display: flex; }
    .alert svg { flex-shrink: 0; width: 16px; height: 16px; }

    /* Submit */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--p700);
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      letter-spacing: .2px;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--p600);
      box-shadow: 0 4px 20px rgba(77,41,117,.35);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(1px); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner { display: block; }
    .btn-primary.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    .footer span { color: var(--p500); font-weight: 600; }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2L3 7v8c0 5.5 4.7 10.7 11 12 6.3-1.3 11-6.5 11-12V7L14 2z" fill="#E9A800"/>
          <path d="M10 14l3 3 5-5" stroke="#4D2975" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>Vernon License</h1>
        <p>FlashLab Developer Portal</p>
      </div>
    </div>

    <div class="welcome">
      <h2>Selamat datang 👋</h2>
      <p>Masuk untuk mengelola lisensi klien</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="alert" id="alertMsg" role="alert">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 6a.75.75 0 01.75.75v3a.75.75 0 01-1.5 0v-3A.75.75 0 018 7zm0-2.5a.875.875 0 110 1.75A.875.875 0 018 4.5z"/>
        </svg>
        <span id="alertText"></span>
      </div>

      <div class="field">
        <label for="email">Alamat Email</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4zm2 0l4 3 4-3M4 12V7l4 3 4-3v5"/>
            </svg>
          </span>
          <input type="email" id="email" name="email"
            placeholder="user@flashlab.id"
            autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Kata Sandi</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M11 5V4a3 3 0 00-6 0v1H3v9h10V5h-2zm-4-1a1 1 0 012 0v1H7V4zm1 6a1 1 0 110-2 1 1 0 010 2z"/>
            </svg>
          </span>
          <input type="password" id="password" name="password"
            placeholder="••••••••"
            autocomplete="current-password" required>
          <button type="button" class="toggle-pwd" id="togglePwd" title="Tampilkan kata sandi">
            <svg id="eyeIcon" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5zm0 8a3 3 0 110-6 3 3 0 010 6zm0-4.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-label">Masuk</span>
      </button>
    </form>

    <div class="footer">
      &copy; 2025 <span>FlashLab</span> · Vernon License v1.0
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect jika sudah login
    if (getToken()) window.location.replace('/dashboard.html');

    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const pwdEl = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const alertMsg = document.getElementById('alertMsg');
    const alertText = document.getElementById('alertText');
    const togglePwd = document.getElementById('togglePwd');

    function showError(msg) {
      alertText.textContent = msg;
      alertMsg.classList.add('show');
      emailEl.classList.add('err');
      pwdEl.classList.add('err');
    }
    function clearError() {
      alertMsg.classList.remove('show');
      emailEl.classList.remove('err');
      pwdEl.classList.remove('err');
    }
    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
    }

    // Toggle password visibility
    togglePwd.addEventListener('click', () => {
      const show = pwdEl.type === 'password';
      pwdEl.type = show ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = show
        ? '<path d="M2 2l12 12M6.5 6.7A3 3 0 0111.3 11M4.2 4.3C2.5 5.6 1 8 1 8s3 5 7 5c1.4 0 2.7-.4 3.8-1.1M9 9a3 3 0 01-3.8-3.8M8 3c4 0 7 5 7 5s-.8 1.4-2.2 2.7"/>'
        : '<path d="M8 3C4 3 1 8 1 8s3 5 7 5 7-5 7-5-3-5-7-5zm0 8a3 3 0 110-6 3 3 0 010 6zm0-4.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/>';
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearError();

      const email = emailEl.value.trim();
      const password = pwdEl.value;
      if (!email || !password) {
        showError('Email dan kata sandi wajib diisi.');
        return;
      }

      setLoading(true);
      try {
        // Handler expects 'identifier' not 'email'
        const res = await api('POST', '/api/v1/auth/login', { identifier: email, password });
        const d = res.data;
        setToken(d.access_token);
        setUser({ id: d.user_id, name: d.name, email: d.email, role: d.role });
        window.location.replace('/dashboard.html');
      } catch (err) {
        showError(err.message || 'Login gagal. Coba lagi.');
        setLoading(false);
      }
    });

    // Hapus error saat mengetik
    [emailEl, pwdEl].forEach(el => el.addEventListener('input', clearError));
  </script>
</body>
</html>
