version: '3.9'
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: flasherp_developer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

volumes:
  pg_data:
    driver: local
